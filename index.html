<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Ultron Trading - Multi AI</title>
  <link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:    #0a0e1a;
  --bg2:   #0f1320;
  --bg3:   #151a2a;
  --s1:    #1a1f30;
  --s2:    #202540;
  --s3:    #2a3050;
  --bd:    rgba(30,144,255,0.12);
  --bd2:   rgba(30,144,255,0.25);
  --bd3:   rgba(30,144,255,0.38);
  --a1:    #1E90FF;
  --a2:    #1875CC;
  --a3:    #1058A0;
  --red:   #FF3333;
  --red2:  #CC0000;
  --redbg: rgba(255,51,51,0.12);
  --gold:  #FFD700;
  --gold2: #FFA500;
  --tx:    #E8F0FF;
  --tx2:   #8AAEE0;
  --tx3:   #4A6080;
  --font:  'Exo 2', sans-serif;
  --font2: 'Rajdhani', sans-serif;
  --radius:16px;
  --radius2:12px;
  --th:58px;
}

body { font-family:var(--font); background:var(--bg); color:var(--tx); min-height:100vh; }

#app { width:100%; max-width:600px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; }

.tbw { position:sticky; top:0; z-index:200; background:rgba(15,19,32,0.97); backdrop-filter:blur(20px); border-bottom:1px solid var(--bd2); height:var(--th); }
.tb  { height:100%; display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 0 12px rgba(30,144,255,0.5); }
.logo-text { font-family:var(--font2); font-size:20px; font-weight:700; color:var(--a1); letter-spacing:1px; text-shadow:0 0 10px rgba(30,144,255,0.5); }
.logo-text span { color:var(--red); }
.tb-r { display:flex; align-items:center; gap:10px; }
.av { width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,var(--a1),var(--a3)); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#fff; }
.tb-name { font-size:12px; font-weight:600; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--tx2); }
.menu-btn { background:none; border:none; cursor:pointer; padding:6px; color:var(--a1); font-size:22px; }

.menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; display:none; }
.menu-overlay.show { display:block; }
.menu-panel { position:fixed; top:0; right:-300px; width:300px; height:100%; background:var(--s1); z-index:301; transition:right 0.3s ease; border-left:1px solid var(--bd2); display:flex; flex-direction:column; }
.menu-panel.show { right:0; }
.menu-header { padding:20px; border-bottom:1px solid var(--bd); display:flex; justify-content:space-between; align-items:center; background:var(--s2); }
.menu-header .close-btn { background:none; border:none; color:var(--tx); font-size:22px; cursor:pointer; }
.menu-user { display:flex; align-items:center; gap:10px; }
.menu-user-info h3 { font-size:14px; font-weight:700; color:var(--a1); }
.menu-user-info p { font-size:11px; color:var(--tx3); }
.menu-items { flex:1; padding:12px; overflow-y:auto; }
.menu-item { display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer; border-radius:10px; color:var(--tx2); font-size:14px; font-weight:500; margin-bottom:4px; transition:all 0.2s; }
.menu-item:hover { background:var(--s2); color:var(--a1); }
.menu-item.active { background:rgba(30,144,255,0.1); color:var(--a1); border-left:3px solid var(--a1); }
.menu-item.danger { color:var(--red); }
.menu-item.danger:hover { background:var(--redbg); }
.menu-footer { padding:16px; border-top:1px solid var(--bd); font-size:11px; color:var(--tx3); }

.bottom-nav { position:sticky; bottom:0; z-index:200; background:var(--bg2); border-top:1px solid var(--bd); padding:10px 16px; display:flex; justify-content:space-around; gap:8px; }
.nav-btn { flex:1; background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 4px; color:var(--tx3); font-size:10px; font-weight:600; cursor:pointer; text-align:center; font-family:var(--font); display:flex; flex-direction:column; align-items:center; gap:2px; transition:all 0.2s; }
.nav-btn .nav-icon { font-size:18px; }
.nav-btn.active, .nav-btn:active { background:rgba(30,144,255,0.14); border-color:var(--bd2); color:var(--a1); }

.scr { padding:14px 16px; min-height:calc(100vh - 130px); }
.tab-pane { display:none; animation:fadeIn 0.2s ease; }
.tab-pane.show { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.card { background:var(--s1); border:1px solid var(--bd); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.card-glow { border-color:var(--bd2); box-shadow:0 0 20px rgba(30,144,255,0.08); }
.ctitle { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--tx3); margin-bottom:12px; font-family:var(--font2); }
.sh { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.sh-t { font-size:22px; font-weight:800; color:var(--a1); font-family:var(--font2); letter-spacing:0.5px; }
.sh-s { font-size:11px; color:var(--tx2); margin-top:2px; }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 16px; border:none; border-radius:var(--radius2); font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; font-family:var(--font); }
.btn:active { transform:scale(0.97); }
.btn-w { width:100%; }
.btn-p { background:linear-gradient(135deg,var(--a1),var(--a2)); color:#fff; box-shadow:0 0 14px rgba(30,144,255,0.25); }
.btn-r { background:linear-gradient(135deg,var(--red),var(--red2)); color:#fff; }
.btn-d { background:var(--redbg); color:var(--red); border:1px solid rgba(255,34,34,0.2); }
.btn-gh { background:var(--s2); color:var(--tx2); border:1px solid var(--bd2); }
.btn-sm { padding:7px 12px; font-size:12px; border-radius:8px; }
.btn-lg { padding:14px 20px; font-size:15px; }

input, textarea, select {
  width:100%; padding:12px 14px; background:var(--bg3); border:1.5px solid var(--bd2);
  border-radius:var(--radius2); color:var(--tx); font-size:14px; margin-bottom:10px;
  outline:none; font-family:var(--font); transition:border-color 0.2s;
}
input:focus, textarea:focus, select:focus { border-color:var(--a1); box-shadow:0 0 8px rgba(30,144,255,0.2); }
select option { background:var(--bg3); }
label { font-size:12px; color:var(--tx2); display:block; margin-bottom:4px; font-weight:600; }

.al { padding:10px 14px; border-radius:var(--radius2); font-size:12px; margin-bottom:10px; font-weight:500; }
.al-s { background:rgba(30,144,255,0.12); color:var(--a1); border:1px solid rgba(30,144,255,0.25); }
.al-e { background:var(--redbg); color:var(--red); border:1px solid rgba(255,51,51,0.25); }
.al-i { background:rgba(30,144,255,0.06); color:var(--tx2); border:1px solid var(--bd); }

.badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
.badge-green { background:rgba(30,144,255,0.15); color:var(--a1); border:1px solid rgba(30,144,255,0.35); }
.badge-red   { background:var(--redbg); color:var(--red); border:1px solid rgba(255,34,34,0.3); }
.badge-gold  { background:rgba(255,215,0,0.15); color:var(--gold); border:1px solid rgba(255,215,0,0.3); }
.badge-gray  { background:var(--s2); color:var(--tx3); border:1px solid var(--bd); }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.15s ease; }
.modal-content { background:var(--s1); border:1px solid var(--bd2); border-radius:var(--radius); padding:24px 20px 20px; width:100%; max-width:450px; max-height:85vh; overflow-y:auto; }
.modal-title { font-size:16px; font-weight:800; color:var(--a1); margin-bottom:6px; font-family:var(--font2); }
.modal-sub { font-size:12px; color:var(--tx2); margin-bottom:16px; line-height:1.5; }
.modal-buttons { display:flex; gap:10px; margin-top:16px; }
.modal-buttons button { flex:1; }

.pw-w { position:relative; margin-bottom:10px; }
.pw-w input { margin-bottom:0; padding-right:45px; }
.eye-btn { position:absolute; right:0; top:0; bottom:0; width:45px; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-size:17px; }

.login-container { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:20px; background:var(--bg); position:relative; overflow:hidden; }
.login-container::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(ellipse at 60% 40%, rgba(30,144,255,0.05) 0%, transparent 60%); pointer-events:none; }
.login-header { text-align:center; margin-bottom:32px; }
.login-header .icon { font-size:52px; margin-bottom:14px; filter:drop-shadow(0 0 14px rgba(30,144,255,0.6)); }
.login-header h1 { font-family:var(--font2); font-size:32px; font-weight:800; color:var(--a1); margin-bottom:4px; text-shadow:0 0 16px rgba(30,144,255,0.5); }
.login-header h1 span { color:var(--red); }
.login-header p { font-size:12px; color:var(--tx2); }
.check-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:13px; color:var(--tx2); }
.check-row input[type="checkbox"] { width:auto; margin-bottom:0; }
.lnk { color:var(--a1); cursor:pointer; font-size:13px; text-decoration:underline; }

.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat-box { background:var(--s1); border:1px solid var(--bd); border-radius:var(--radius2); padding:14px 10px; text-align:center; }
.stat-val { font-size:26px; font-weight:900; color:var(--a1); font-family:var(--font2); }
.stat-val.red { color:var(--red); }
.stat-label { font-size:10px; color:var(--tx3); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }
.info-btn:hover { background:rgba(30,144,255,0.3) !important; transform:scale(1.1); }
.market-item { 
  background:var(--s1); 
  border:1px solid var(--bd); 
  border-radius:var(--radius); 
  margin-bottom:8px; 
  display:flex; 
  flex-direction:column; 
  gap:4px;
  position:relative; 
  overflow:hidden; 
}
.market-item.on-sale { background:linear-gradient(135deg,rgba(255,80,0,0.07),rgba(255,30,30,0.04)); border-color:rgba(255,100,0,0.35); }
.market-item.banner-mode { padding:0; overflow:hidden; }
.market-item.banner-mode .market-img { width:100%; height:160px; object-fit:cover; border-radius:var(--radius) var(--radius) 0 0; }
.market-item.banner-mode .market-img-placeholder { width:100%; height:160px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:var(--radius) var(--radius) 0 0; display:flex; align-items:center; justify-content:center; font-size:28px; }
.market-item.banner-mode .market-content { padding:8px 16px 12px 16px !important; }
.market-item.banner-mode .market-title { font-size:13px; font-weight:600; margin-bottom:0; }
.sale-corner-badge { position:absolute; top:0; right:0; background:linear-gradient(135deg,#FF4500,#CC0000); color:#fff; font-size:9px; font-weight:900; padding:5px 10px; border-bottom-left-radius:10px; letter-spacing:0.5px; text-transform:uppercase; z-index:2; }
.price-was { font-size:13px; color:var(--tx3); text-decoration:line-through; margin-right:6px; }
.price-save { font-size:10px; font-weight:800; color:#FF4500; background:rgba(255,69,0,0.12); border:1px solid rgba(255,69,0,0.3); border-radius:10px; padding:2px 7px; }
.sale-valid-until { font-size:9px; color:var(--tx3); background:rgba(0,0,0,0.3); padding:2px 6px; border-radius:8px; }
.market-img { width:100%; height:56px; object-fit:contain; border-radius:10px; background:var(--s2); }
.market-img-placeholder { width:100%; height:56px; background:linear-gradient(135deg,var(--s1),var(--s2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:28px; }
.market-content { padding:0 16px 12px 16px !important; }
.market-title { font-size:13px; font-weight:600; color:var(--tx); }
.market-desc {
  font-size: 12px;
  color: var(--tx2);
  line-height: 1.6;
  margin-top: 4px;
  white-space: pre-line;
}
.market-price { font-size:16px; font-weight:900; color:var(--a1); font-family:var(--font2); }
.market-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 2px;
  margin-bottom: 0;
}

.contact-card { background:var(--s1); border:1px solid var(--bd); border-radius:var(--radius2); padding:14px; margin-bottom:10px; display:flex; align-items:center; gap:14px; }
.c-av { width:46px; height:46px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; color:#fff; flex-shrink:0; }
.c-name { font-weight:700; font-size:15px; }
.c-sub { font-size:12px; color:var(--tx2); margin-top:2px; }
.c-btns { display:flex; gap:8px; margin-left:auto; }

.journal-folder-card { background:var(--s1); border:1px solid var(--bd); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
.journal-folder-header { padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.2s; }
.journal-folder-header:hover { background:var(--s2); }
.journal-folder-icon { font-size:28px; }
.journal-folder-title { flex:1; font-size:16px; font-weight:700; color:var(--tx); }
.journal-folder-stats { display:flex; gap:8px; align-items:center; }
.journal-folder-stats .badge { font-size:10px; }
.journal-folder-actions { display:flex; gap:6px; }
.journal-folder-content { padding:0 16px 16px 16px; border-top:1px solid var(--bd); display:none; }
.journal-folder-content.show { display:block; }
.trade-card { background:var(--s2); border-radius:10px; padding:14px; margin-top:10px; border-left:3px solid var(--a1); }
.trade-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.trade-title { font-weight:700; font-size:14px; }
.trade-meta { font-size:10px; color:var(--tx3); margin-top:2px; }
.trade-details { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:8px; font-size:11px; }
.trade-detail { display:flex; justify-content:space-between; }
.trade-detail-label { color:var(--tx3); }
.trade-detail-value { font-weight:600; color:var(--tx); }
.trade-notes { font-size:11px; color:var(--tx2); margin-top:8px; padding-top:6px; border-top:1px solid var(--bd); }

.result-box { background:var(--s2); border:1px solid var(--bd2); border-radius:var(--radius2); padding:16px; margin-bottom:10px; }
.result-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--bd); }
.result-row:last-child { border-bottom:none; }
.result-label { font-size:13px; color:var(--tx2); }
.result-val { font-size:15px; font-weight:800; color:var(--a1); font-family:var(--font2); }
.result-val.red { color:var(--red); }
.result-val.gold { color:var(--gold); }
.rr-bar { height:8px; background:var(--s3); border-radius:4px; overflow:hidden; margin-top:6px; }
.rr-fill { height:100%; background:linear-gradient(90deg,var(--a1),var(--a2)); border-radius:4px; transition:width 0.5s ease; }

.analysis-tabs { display:flex; gap:8px; margin-bottom:16px; }
.analysis-tab { flex:1; padding:10px; border:1px solid var(--bd); border-radius:10px; background:var(--s1); color:var(--tx2); font-size:13px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s; font-family:var(--font); }
.analysis-tab.active { background:rgba(30,144,255,0.14); border-color:var(--bd2); color:var(--a1); }

.ai-selector { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.ai-btn { flex:1; padding:8px; border:1px solid var(--bd2); border-radius:10px; background:var(--s1); color:var(--tx2); font-size:11px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s; }
.ai-btn.active { background:rgba(30,144,255,0.14); border-color:var(--a1); color:var(--a1); }
.ai-btn.free { background:rgba(30,144,255,0.05); }
.ai-btn.paid { background:rgba(255,215,0,0.05); }

.chart-upload-area { border:2px dashed var(--bd2); border-radius:var(--radius); padding:32px 20px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:14px; }
.chart-upload-area:hover { border-color:var(--a1); background:rgba(30,144,255,0.05); }
.chart-preview { width:100%; border-radius:var(--radius2); margin-bottom:14px; max-height:280px; object-fit:contain; background:var(--s2); }
.analysis-result { background:var(--s2); border:1px solid var(--bd2); border-radius:var(--radius); padding:16px; margin-top:14px; }
.analysis-section { margin-bottom:14px; }
.analysis-section h4 { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--a1); margin-bottom:6px; font-family:var(--font2); }
.analysis-section p, .analysis-section div { font-size:13px; color:var(--tx); line-height:1.6; }
.signal-buy  { color:var(--a1); font-weight:800; font-size:18px; text-shadow:0 0 8px rgba(30,144,255,0.5); }
.signal-sell { color:var(--red); font-weight:800; font-size:18px; text-shadow:0 0 8px rgba(255,34,34,0.4); }
.signal-wait { color:var(--gold); font-weight:800; font-size:18px; }
.ai-text { font-size:13px; line-height:1.7; color:var(--tx); white-space:pre-wrap; }
.ai-text strong, .ai-text b { color:var(--gold); }

.user-row { background:var(--s2); border-radius:12px; padding:12px; margin-bottom:10px; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--bd2); border-top-color:var(--a1); border-radius:50%; animation:spin 0.7s linear infinite; }

.token-bar { display:flex; align-items:center; gap:8px; background:var(--s2); border:1px solid var(--bd2); border-radius:10px; padding:8px 12px; margin-bottom:12px; }
.token-count { font-family:var(--font2); font-size:18px; font-weight:800; color:var(--gold); }
.token-label { font-size:11px; color:var(--tx2); }
.vip-badge { background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.1)); border:1px solid rgba(255,215,0,0.4); color:var(--gold); border-radius:20px; padding:3px 10px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }
@keyframes spin { to { transform:rotate(360deg); } }

.learning-folder { background:var(--s1); border:1px solid var(--bd); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
.learning-folder-header { padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.2s; }
.learning-folder-header:hover { background:var(--s2); }
.learning-folder-icon { font-size:28px; }
.learning-folder-title { flex:1; font-size:16px; font-weight:700; color:var(--tx); }
.learning-folder-badge { font-size:10px; padding:4px 10px; border-radius:20px; }
.learning-folder-badge.free { background:rgba(30,144,255,0.15); color:var(--a1); }
.learning-folder-badge.vip { background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,165,0,0.1)); color:var(--gold); }
.learning-folder-content { padding:0 16px 16px 16px; border-top:1px solid var(--bd); display:none; }
.learning-folder-content.show { display:block; }
.learning-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--s2); border-radius:10px; margin-top:10px; cursor:pointer; transition:all 0.2s; }
.learning-item:hover { background:var(--s3); transform:translateX(4px); }
.learning-item-icon { font-size:20px; }
.learning-item-title { flex:1; font-size:14px; font-weight:500; color:var(--tx); }
.learning-item-link { font-size:11px; color:var(--a1); }

.pull-to-refresh {
  position: fixed;
  top: -50px;
  left: 0;
  right: 0;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--s2);
  color: var(--a1);
  font-size: 12px;
  z-index: 1000;
  transition: top 0.2s ease;
  border-bottom: 1px solid var(--bd2);
}
.pull-to-refresh .spinner-small {
  width: 16px;
  height: 16px;

const renderChatView = async (otherUsername) => {
  const allMessages = await loadMessages(currentUser.username);
  const conv = allMessages.filter(m =>
    (m.sender === currentUser.username && m.recipient === otherUsername) ||
    (m.sender === otherUsername && m.recipient === currentUser.username)
  ).sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));

  const otherIsAdmin = ADMINS.some(a => a.username === otherUsername);
  const allUsers = await getUsers();
  const otherUser = allUsers.find(u => u.username === otherUsername);
  const otherPhone = otherIsAdmin ? ADMINS.find(a => a.username === otherUsername)?.phone : otherUser?.phone;

  const messagesHtml = conv.length === 0
    ? '<div style="text-align:center;color:var(--tx3);padding:40px;font-size:13px;">No messages yet. Send the first one!</div>'
    : conv.map(m => {
        const isMine = m.sender === currentUser.username;
        const time = m.created_at ? new Date(m.created_at).toLocaleTimeString('en-ZA', {hour:'2-digit',minute:'2-digit'}) : '';
        return `<div style="display:flex;justify-content:${isMine ? 'flex-end' : 'flex-start'};margin-bottom:10px;position:relative;">
          <div style="max-width:78%;background:${isMine ? 'rgba(30,144,255,0.2)' : 'var(--s2)'};border:1px solid ${isMine ? 'var(--bd2)' : 'var(--bd)'};border-radius:${isMine ? '14px 14px 4px 14px' : '14px 14px 14px 4px'};padding:10px 14px;">
            <div style="font-size:13px;color:var(--tx);white-space:pre-wrap;line-height:1.5;">${esc(m.text)}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:4px;display:flex;justify-content:space-between;align-items:center;">
              <span>${time}</span>
              <button onclick="deleteMessage(${m.id})" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:11px;margin-left:8px;" title="Delete message">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('');

  let overlay = document.getElementById('chatOverlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'chatOverlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;max-width:600px;margin:0 auto;';
    overlay.innerHTML = `
      <div style="background:var(--s1);border-bottom:1px solid var(--bd2);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;">
        <button onclick="closeChatOverlay()" style="background:none;border:none;color:var(--a1);font-size:22px;cursor:pointer;padding:0;">←</button>
        <div style="width:36px;height:36px;border-radius:10px;background:${otherIsAdmin ? 'linear-gradient(135deg,var(--gold),var(--gold2))' : 'linear-gradient(135deg,var(--a1),var(--a3))'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:${otherIsAdmin ? '#050810' : '#fff'};">${otherUsername.substring(0,2).toUpperCase()}</div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:14px;">${esc(otherUsername)}</div>
          ${otherIsAdmin ? '<div style="font-size:10px;color:var(--gold);">👑 Admin</div>' : ''}
        </div>
        <button onclick="deleteConversation('${esc(otherUsername)}')" style="background:rgba(255,51,51,0.2);border:1px solid rgba(255,51,51,0.3);color:var(--red);padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">🗑️ Clear All</button>
        ${otherPhone ? `<button onclick="openWA('${otherPhone}')" style="background:#25D366;border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;">📱 WA</button>` : ''}
      </div>
      <div id="chatMessages" style="flex:1;overflow-y:auto;padding:16px;"></div>
      <div style="background:var(--s1);border-top:1px solid var(--bd2);padding:12px 16px;display:flex;gap:10px;flex-shrink:0;">
        <textarea id="chatInput" placeholder="Type a message..." rows="1" style="flex:1;margin-bottom:0;resize:none;min-height:44px;max-height:120px;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage('${esc(otherUsername)}');}"></textarea>
        <button onclick="sendChatMessage('${esc(otherUsername)}')" style="background:linear-gradient(135deg,var(--a1),var(--a2));border:none;color:#fff;padding:8px 16px;border-radius:10px;cursor:pointer;font-size:18px;flex-shrink:0;">➤</button>
      </div>
    `;
    document.body.appendChild(overlay);
  }

  const msgDiv = document.getElementById('chatMessages');
  if (msgDiv) {
    msgDiv.innerHTML = messagesHtml;
    msgDiv.scrollTop = msgDiv.scrollHeight;
  }
};

const sendChatMessage = async (recipient) => {
  const input = document.getElementById('chatInput');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  const msgDiv = document.getElementById('chatMessages');
  if (msgDiv) {
    const now = new Date().toLocaleTimeString('en-ZA', {hour:'2-digit',minute:'2-digit'});
    const tempMsg = document.createElement('div');
    tempMsg.style.cssText = 'display:flex;justify-content:flex-end;margin-bottom:10px;';
    tempMsg.innerHTML = `<div style="max-width:78%;background:rgba(30,144,255,0.2);border:1px solid var(--bd2);border-radius:14px 14px 4px 14px;padding:10px 14px;">
      <div style="font-size:13px;color:var(--tx);white-space:pre-wrap;line-height:1.5;">${esc(text)}</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:4px;text-align:right;">${now} ⏳</div>
    </div>`;
    msgDiv.appendChild(tempMsg);
    msgDiv.scrollTop = msgDiv.scrollHeight;
  }

  const ok = await sendInAppMessage(recipient, currentUser.username, text, 'chat', null);
  if (ok) await renderChatView(recipient);
  else { if (input) input.value = text; showMsg('❌ Failed to send message', 'error'); if (msgDiv && msgDiv.lastChild) msgDiv.removeChild(msgDiv.lastChild); }
};

const analyzeChartLocally = (file) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = Math.min(600, img.width);
          canvas.height = Math.min(400, img.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          const W = canvas.width, H = canvas.height;

          let greenPixels = 0, redPixels = 0, darkPixels = 0, totalPx = 0;
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
            if (a < 80) continue;
            totalPx++;
            const bright = (r + g + b) / 3;
            if (bright < 60) darkPixels++;
            if (g > r * 1.3 && g > b * 1.3 && g > 80) greenPixels++;
            if (r > g * 1.3 && r > b * 1.3 && r > 80) redPixels++;
          }

          const colBrightness = [];
          for (let x = 0; x < W; x += 2) {
            let sum = 0, cnt = 0;
            for (let y = Math.floor(H * 0.1); y < Math.floor(H * 0.85); y += 3) {
              const idx = (y * W + x) * 4;
              sum += (data[idx] + data[idx+1] + data[idx+2]) / 3;
              cnt++;
            }
            colBrightness.push(sum / cnt);
          }
          let brightChanges = 0;
          for (let i = 1; i < colBrightness.length; i++) {
            if (Math.abs(colBrightness[i] - colBrightness[i-1]) > 12) brightChanges++;
          }

          const ZONES = 16;
          const zoneBright = new Array(ZONES).fill(0);
          const zoneCount = new Array(ZONES).fill(0);
          const HZONES = 10;
          const hBright = new Array(HZONES).fill(0);
          const hCount = new Array(HZONES).fill(0);

          for (let y = 0; y < H; y++) {
            for (let x = 0; x < W; x++) {
              const idx = (y * W + x) * 4;
              if (data[idx+3] < 80) continue;
              const bright = (data[idx] + data[idx+1] + data[idx+2]) / 3;
              const zone = Math.min(Math.floor(x / W * ZONES), ZONES - 1);
              zoneBright[zone] += bright;
              zoneCount[zone]++;
              const hz = Math.min(Math.floor(y / H * HZONES), HZONES - 1);
              hBright[hz] += bright;
              hCount[hz]++;
            }
          }

          const normZ = zoneBright.map((b, i) => zoneCount[i] > 0 ? b / zoneCount[i] : 128);
          const normH = hBright.map((b, i) => hCount[i] > 0 ? b / hCount[i] : 128);

          let leftG = 0, leftR = 0, rightG = 0, rightR = 0;
          for (let y = Math.floor(H * 0.05); y < Math.floor(H * 0.9); y++) {
            for (let x = 0; x < W; x++) {
              const idx = (y * W + x) * 4;
              const r = data[idx], g = data[idx+1], b = data[idx+2];
              if (data[idx+3] < 80) continue;
              const isGreen = g > r * 1.25 && g > 80;
              const isRed = r > g * 1.25 && r > 80;
              if (x < W / 2) { if (isGreen) leftG++; if (isRed) leftR++; }
              else { if (isGreen) rightG++; if (isRed) rightR++; }
            }
          }

          const leftThird = normZ.slice(0, ZONES / 3).reduce((a, b) => a + b, 0) / (ZONES / 3);
          const rightThird = normZ.slice(2 * ZONES / 3).reduce((a, b) => a + b, 0) / (ZONES / 3);
          const middleThird = normZ.slice(ZONES / 3, 2 * ZONES / 3).reduce((a, b) => a + b, 0) / (ZONES / 3);

          let trend = 'NEUTRAL', strength = 'WEAK', confidence = 52;
          const rightBullish = rightG > rightR;
          const brightDiff = Math.abs(rightThird - leftThird) / Math.max(leftThird, rightThird, 1);

          if (rightBullish && rightThird >= leftThird * 1.05) {
            trend = 'BULLISH';
            strength = rightG > rightR * 1.4 || brightDiff > 0.12 ? 'STRONG' : 'MODERATE';
            confidence = Math.min(88, 55 + Math.round(brightDiff * 120) + (rightG > rightR * 1.5 ? 10 : 0));
          } else if (!rightBullish && leftThird >= rightThird * 1.05) {
            trend = 'BEARISH';
            strength = rightR > rightG * 1.4 || brightDiff > 0.12 ? 'STRONG' : 'MODERATE';
            confidence = Math.min(88, 55 + Math.round(brightDiff * 120) + (rightR > rightG * 1.5 ? 10 : 0));
          } else if (middleThird > leftThird * 1.04 && middleThird > rightThird * 1.04) {
            trend = 'RANGING'; strength = 'MODERATE'; confidence = 62;
          } else {
            if (rightThird > leftThird * 1.07) { trend = 'BULLISH'; strength = 'WEAK'; confidence = 56; }
            else if (leftThird > rightThird * 1.07) { trend = 'BEARISH'; strength = 'WEAK'; confidence = 56; }
            else { trend = 'RANGING'; strength = 'WEAK'; confidence = 54; }
          }

          const supports = [], resistances = [];
          for (let i = 1; i < HZONES - 1; i++) {
            if (normH[i] < normH[i-1] * 0.93 && normH[i] < normH[i+1] * 0.93) supports.push(i);
            if (normH[i] > normH[i-1] * 1.07 && normH[i] > normH[i+1] * 1.07) resistances.push(i);
          }

          const fvgs = [];
          for (let i = 2; i < ZONES - 2; i++) {
            const prev = (normZ[i-2] + normZ[i-1]) / 2;
            const next = (normZ[i+1] + normZ[i+2]) / 2;
            if (normZ[i] > prev * 1.1 && normZ[i] > next * 1.1) fvgs.push({ type: 'bullish' });
            else if (normZ[i] < prev * 0.9 && normZ[i] < next * 0.9) fvgs.push({ type: 'bearish' });
          }

          let variance = 0, meanB = 0, pc = 0;
          for (let i = 0; i < data.length; i += 4) {
            if (data[i+3] < 80) continue;
            meanB += (data[i] + data[i+1] + data[i+2]) / 3; pc++;
          }
          meanB /= pc;
          for (let i = 0; i < data.length; i += 4) {
            if (data[i+3] < 80) continue;
            variance += Math.pow((data[i] + data[i+1] + data[i+2]) / 3 - meanB, 2);
          }
          const volatility = Math.sqrt(variance / pc) > 68 ? 'HIGH' : Math.sqrt(variance / pc) > 36 ? 'MEDIUM' : 'LOW';

          const patterns = [];
          if (trend === 'BULLISH') patterns.push('📈 Uptrend – higher highs and higher lows visible');
          else if (trend === 'BEARISH') patterns.push('📉 Downtrend – lower highs and lower lows visible');
          else patterns.push('📊 Consolidation / Range – waiting for breakout');
          if (greenPixels > redPixels * 1.5) patterns.push('🕯️ Dominant bullish candles – buyers in control');
          else if (redPixels > greenPixels * 1.5) patterns.push('🕯️ Dominant bearish candles – sellers in control');
          if (supports.length > 0) patterns.push('🛡️ Support zone detected – watch for price bounce');
          if (resistances.length > 0) patterns.push('🔴 Resistance zone detected – watch for rejection');
          if (fvgs.length > 0) patterns.push('🔍 Fair Value Gap(s) detected – potential fill area');
          if (volatility === 'HIGH') patterns.push('⚡ High volatility – use wider stops');

          let signal = 'WAIT', entry = '', sl = '', tp1 = '', tp2 = '';
          if (trend === 'BULLISH' && strength !== 'WEAK') {
            signal = 'BUY';
            entry = 'Look to buy on pullback to nearest support zone';
            sl = 'Below most recent swing low (1.5–2% below entry)';
            tp1 = 'First resistance level (1.5× risk)';
            tp2 = 'Major resistance / structure high (2.5× risk)';
          } else if (trend === 'BEARISH' && strength !== 'WEAK') {
            signal = 'SELL';
            entry = 'Look to sell on rally to nearest resistance zone';
            sl = 'Above most recent swing high (1.5–2% above entry)';
            tp1 = 'First support level (1.5× risk)';
            tp2 = 'Major support / structure low (2.5× risk)';
          } else {
            signal = 'WAIT';
            entry = 'Wait for clear break + retest of range boundary';
            sl = 'Opposite side of range';
            tp1 = '1.5× range height';
            tp2 = '2× range height';
          }

          resolve({
            trend, strength, confidence, volatility,
            signal, entry, sl, tp1, tp2,
            supports: supports.length, resistances: resistances.length,
            fvgCount: fvgs.length, patterns,
            isChart: true
          });
        } catch(err) {
          reject(new Error(err.message));
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
};

const compressImage = (file, maxSizeKB = 250, maxDim = 800) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onerror = () => reject(new Error('File read error'));
  reader.onload = (e) => {
    const img = new Image();
    img.onerror = () => reject(new Error('Image load error'));
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.65;
      let dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length * 0.75 > maxSizeKB * 1024 && quality > 0.15) {
        quality -= 0.05;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      resolve(dataUrl.split(',')[1]);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

const imageToBase64 = (file) => compressImage(file);

const formatAIResponse = (text, aiName) => {
  let signalClass = 'signal-wait', signalText = 'WAIT';
  const lowerText = text.toLowerCase();
  if (lowerText.includes('buy') && !lowerText.includes('sell')) { signalClass = 'signal-buy'; signalText = 'BUY'; }
  else if (lowerText.includes('sell') && !lowerText.includes('buy')) { signalClass = 'signal-sell'; signalText = 'SELL'; }
  const formatted = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  return '<div class="analysis-result"><div style="text-align:center;padding:14px 0;border-bottom:1px solid var(--bd);margin-bottom:16px;"><div style="font-size:10px;">🤖 ' + aiName + ' Signal</div><div class="' + signalClass + '" style="font-size:24px;">' + signalText + '</div></div><div class="ai-text">' + formatted + '</div><div style="margin-top:14px;font-size:11px;color:var(--tx3);">⚠️ AI analysis for informational purposes only.</div></div>';
};

const calcRisk = () => {
  const balance = parseFloat(document.getElementById('rc_balance')?.value) || 0;
  const riskPct = parseFloat(document.getElementById('rc_risk')?.value) || 0;
  const entry = parseFloat(document.getElementById('rc_entry')?.value) || 0;
  const sl = parseFloat(document.getElementById('rc_sl')?.value) || 0;
  const tp = parseFloat(document.getElementById('rc_tp')?.value) || 0;
  const pipVal = parseFloat(document.getElementById('rc_pip_value')?.value) || 10;
  if (!balance || !riskPct || !entry || !sl) { showMsg('Fill all fields', 'error'); return; }
  const riskAmt = balance * (riskPct / 100);
  const slPips = Math.abs(entry - sl);
  const lotSize = riskAmt / (slPips * pipVal);
  const rr = tp > 0 ? (Math.abs(tp - entry) / slPips).toFixed(2) : 0;
  document.getElementById('rc_results').innerHTML = '<div class="result-box"><div class="result-row"><span class="result-label">💰 Risk Amount</span><span class="result-val red">R' + riskAmt.toFixed(2) + '</span></div><div class="result-row"><span class="result-label">📏 SL Distance</span><span class="result-val">' + slPips.toFixed(2) + ' pips</span></div><div class="result-row"><span class="result-label">📊 Lot Size</span><span class="result-val">' + lotSize.toFixed(2) + ' lots</span></div>' + (rr > 0 ? '<div class="result-row"><span class="result-label">⚖️ Risk:Reward</span><span class="result-val">1:' + rr + '</span></div>' : '') + '</div>';
};

// ============================================================
const createRefreshIndicator = () => {
  if (refreshIndicator) return;
  refreshIndicator = document.createElement('div');
  refreshIndicator.className = 'pull-to-refresh';
  refreshIndicator.innerHTML = '<span>⬇️</span><span>Pull down to refresh</span>';
  document.body.appendChild(refreshIndicator);
};

const showRefreshPull = (pullDistance) => {
  if (!refreshIndicator) return;
  if (pullDistance > 60) {
    refreshIndicator.innerHTML = '<div class="spinner-small"></div><span>Release to refresh</span>';
    refreshIndicator.style.background = 'var(--s3)';
  } else if (pullDistance > 20) {
    refreshIndicator.innerHTML = '<span>⬇️</span><span>Pull down to refresh</span>';
    refreshIndicator.style.background = 'var(--s2)';
  }
  refreshIndicator.style.top = Math.min(pullDistance - 50, 0) + 'px';
};

const showRefreshLoading = () => {
  if (!refreshIndicator) return;
  refreshIndicator.innerHTML = '<div class="spinner-small"></div><span>Refreshing...</span>';
  refreshIndicator.style.top = '0';
  refreshIndicator.style.background = 'var(--s3)';
};

const hideRefreshIndicator = () => {
  if (!refreshIndicator) return;
  refreshIndicator.style.top = '-50px';
  setTimeout(() => {
    if (refreshIndicator) refreshIndicator.innerHTML = '<span>⬇️</span><span>Pull down to refresh</span>';
  }, 300);
};

const performRefresh = async () => {
  if (isRefreshing) return;
  isRefreshing = true;
  showRefreshLoading();
  try {
    await loadMarketItems();
    await loadJournals(currentUser?.username || '');
    await loadLearningFolders();
    await loadLearningItems();
    if (currentView === 'home') renderHome();
    if (currentView === 'marketplace') renderMarketplace();
    if (currentView === 'contacts') renderContacts();
    if (currentView === 'community') renderCommunity();
    if (currentView === 'journal') renderJournal();
    if (currentView === 'risk') renderRiskCalc();
    if (currentView === 'sessions') renderSessions();
    if (currentView === 'checklist') renderChecklist();
    if (currentView === 'analysis') renderAnalysis();
    if (currentView === 'learning') renderLearning();
    if (currentView === 'settings') renderSettings();
    if (currentView === 'admin') renderAdminPanel();
    showMsg('Refreshed successfully!', 'success');
  } catch (e) {
    showMsg('Refresh failed: ' + e.message, 'error');
  } finally {
    isRefreshing = false;
    setTimeout(() => hideRefreshIndicator(), 500);
  }
};

const initPullToRefresh = () => {
  createRefreshIndicator();
  let startY = 0, isDragging = false;
  document.addEventListener('touchstart', (e) => { if (window.scrollY === 0) { startY = e.touches[0].clientY; isDragging = true; } });
  document.addEventListener('touchmove', (e) => {
    if (!isDragging || isRefreshing) return;
    const pullDistance = e.touches[0].clientY - startY;
    if (pullDistance > 0 && window.scrollY === 0) { e.preventDefault(); showRefreshPull(pullDistance); }
  });
  document.addEventListener('touchend', (e) => {
    if (!isDragging || isRefreshing) return;
    isDragging = false;
    if (e.changedTouches[0].clientY - startY > 60 && window.scrollY === 0) performRefresh();
    else hideRefreshIndicator();
  });
};

const setVip = async (username, vip) => {
  if (!vip) {
    if (confirm('Remove VIP from ' + username + '?')) {
      await updateUser(username, { is_vip: false, vip_paid_date: null });
      if (currentUser.username === username) { currentUser.is_vip = false; currentUser.vip_paid_date = null; }
      await renderAdminPanel();
      showMsg('VIP removed from ' + username, 'success');
    }
    return;
  }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const today = new Date().toISOString().split('T')[0];
  overlay.innerHTML = '<div class="modal-content">' +
    '<div class="modal-title">⭐ Grant VIP — ' + esc(username) + '</div>' +
    '<div class="modal-sub">Enter the payment date. The user will get VIP benefits until next month.</div>' +
    '<label>Payment Date</label>' +
    '<input type="date" id="vipDateInput" value="' + today + '">' +
    '<div id="vipDateMsg"></div>' +
    '<div class="modal-buttons">' +
      '<button class="btn btn-p" onclick="confirmSetVip(\'' + esc(username) + '\')">✅ Grant VIP</button>' +
      '<button class="btn btn-gh" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
    '</div>' +
  '</div>';
  document.body.appendChild(overlay);
};

const confirmSetVip = async (username) => {
  const dateVal = document.getElementById('vipDateInput')?.value;
  if (!dateVal) { document.getElementById('vipDateMsg').innerHTML = '<div class="al al-e">Please select a date</div>'; return; }
  const ok = await updateUser(username, { is_vip: true, vip_paid_date: dateVal });
  if (!ok) { document.getElementById('vipDateMsg').innerHTML = '<div class="al al-e">Error saving — check connection</div>'; return; }
  if (currentUser.username === username) {
    currentUser.is_vip = true;
    currentUser.vip_paid_date = dateVal;
  }
  document.querySelector('.modal-overlay')?.remove();
  showMsg('VIP granted! Renewal date set for ' + getVipRenewalDate(dateVal), 'success');
  await renderAdminPanel();
};

const getVipRenewalDate = (paidDateStr) => {
  const d = new Date(paidDateStr + 'T00:00:00');
  const day = d.getDate();
  const nextMonth = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  const lastDay = new Date(nextMonth.getFullYear(), nextMonth.getMonth() + 1, 0).getDate();
  nextMonth.setDate(Math.min(day, lastDay));
  return nextMonth.toISOString().split('T')[0];
};

const checkVipRenewals = async () => {
  const today = getTodayStr();
  const users = await getUsers();
  let sent = 0;
  users.filter(u => u.is_vip && u.vip_paid_date && u.phone).forEach(u => {
    const renewal = getVipRenewalDate(u.vip_paid_date);
    if (renewal === today) {
      const msg = 'Hi ' + u.username + '! 👋\n\n⭐ *Ultron Trading Solutions — VIP Renewal*\n\nYour VIP membership is due for renewal today. Please make your payment of *R200* to keep enjoying unlimited chart analysis, signals, and VIP content.\n\nThank you for being part of our community! 🚀';
      openWA(u.phone, msg);
      sent++;
    }
  });
  if (sent === 0) showMsg('No renewals due today.', 'success');
};

const setAdmin = async (username, makeAdmin) => {
  if (!confirm(makeAdmin ? 'Grant admin access to ' + username + '?' : 'Remove admin access from ' + username + '?')) return;
  await updateUser(username, { role: makeAdmin ? 'admin' : 'user' });
  if (currentUser.username === username) currentUser.role = makeAdmin ? 'admin' : 'user';
  renderAdminPanel();
  showMsg(makeAdmin ? username + ' is now an admin.' : 'Admin access removed.', 'success');
};

const removeUser = async (username) => { if (confirm('Delete user?')) { await deleteUser(username); renderAdminPanel(); } };

const addBroker = async () => {
  const name = document.getElementById('brokerName')?.value.trim();
  const link = document.getElementById('brokerLink')?.value.trim();
  const image_url = document.getElementById('brokerImageUrl')?.value.trim() || null;
  if (!name || !link) { showMsg('Broker name and link required', 'error'); return; }
  if (!appSettings.brokers) appSettings.brokers = [];
  appSettings.brokers.push({ name, link, image_url });
  const ok = await saveAppSettings();
  if (ok) { showMsg('Broker added!', 'success'); renderAdminPanel(); }
  else showMsg('Error saving broker', 'error');
};

const removeBroker = async (index) => {
  if (!confirm('Remove this broker?')) return;
  appSettings.brokers.splice(index, 1);
  const ok = await saveAppSettings();
  if (ok) { showMsg('Broker removed', 'success'); renderAdminPanel(); }
  else showMsg('Error removing broker', 'error');
};

const calcPips = () => {
  const pair = document.getElementById('pc_pair')?.value;
  const lotType = document.getElementById('pc_lot_type')?.value;
  const lots = parseFloat(document.getElementById('pc_lots')?.value) || 0.1;
  const exRate = parseFloat(document.getElementById('pc_exchange')?.value) || 1;
  const currency = document.getElementById('pc_currency')?.value || 'USD';
  const contractSizes = { standard: 100000, mini: 10000, micro: 1000, nano: 100 };
  const contractSize = contractSizes[lotType] || 100000;
  let pipValueUSD = 0;
  switch(pair) {
    case 'forex_major': pipValueUSD = (0.0001 / 1) * contractSize * lots; break;
    case 'forex_jpy':   pipValueUSD = (0.01 / 1) * contractSize * lots / 100; break;
    case 'forex_minor': pipValueUSD = (0.0001 / 1) * contractSize * lots; break;
    case 'gold':        pipValueUSD = 0.1 * contractSize * lots / 100; break;
    case 'silver':      pipValueUSD = 0.01 * contractSize * lots / 100; break;
    case 'us30':        pipValueUSD = 1 * lots; break;
    case 'nas100':      pipValueUSD = 1 * lots; break;
    case 'crypto':      pipValueUSD = 1 * lots; break;
    default:            pipValueUSD = (0.0001) * contractSize * lots;
  }
  const pipValueLocal = currency === 'USD' ? pipValueUSD : pipValueUSD * exRate;
  const sym = currency === 'ZAR' ? 'R' : (currency === 'USD' ? '$' : currency + ' ');
  document.getElementById('pip_results').innerHTML = `
    <div class="result-box">
      <div class="result-row"><span class="result-label">💵 Pip Value (USD)</span><span class="result-val">$${pipValueUSD.toFixed(4)}</span></div>
      <div class="result-row"><span class="result-label">💰 Pip Value (${currency})</span><span class="result-val gold">${sym}${pipValueLocal.toFixed(4)}</span></div>
      <div class="result-row"><span class="result-label">📦 Contract Size</span><span class="result-val">${(contractSize * lots).toLocaleString()} units</span></div>
      <div class="result-row"><span class="result-label">📊 10 pip move = </span><span class="result-val">${sym}${(pipValueLocal * 10).toFixed(2)}</span></div>
      <div class="result-row"><span class="result-label">📊 20 pip move = </span><span class="result-val">${sym}${(pipValueLocal * 20).toFixed(2)}</span></div>
      <div class="result-row"><span class="result-label">📊 50 pip move = </span><span class="result-val gold">${sym}${(pipValueLocal * 50).toFixed(2)}</span></div>
    </div>`;
};

const calcPipDistance = () => {
  const entry = parseFloat(document.getElementById('pd_entry')?.value);
  const sl = parseFloat(document.getElementById('pd_sl')?.value);
  const tp = parseFloat(document.getElementById('pd_tp')?.value);
  const type = document.getElementById('pd_type')?.value;
  if (!entry || !sl) { document.getElementById('pd_results').innerHTML = '<div class="al al-e">Enter entry and stop loss</div>'; return; }
  const pipSizes = { forex_major: 0.0001, forex_jpy: 0.01, gold: 0.1, us30: 1, crypto: 1 };
  const pipSize = pipSizes[type] || 0.0001;
  const slPips = Math.abs(entry - sl) / pipSize;
  const tpPips = tp ? Math.abs(tp - entry) / pipSize : 0;
  const rr = tpPips ? (tpPips / slPips).toFixed(2) : 0;
  document.getElementById('pd_results').innerHTML = `
    <div class="result-box" style="margin-top:12px;">
      <div class="result-row"><span class="result-label">📉 SL Distance</span><span class="result-val red">${slPips.toFixed(1)} pips</span></div>
      ${tp ? `<div class="result-row"><span class="result-label">📈 TP Distance</span><span class="result-val">${tpPips.toFixed(1)} pips</span></div><div class="result-row"><span class="result-label">⚖️ Risk:Reward</span><span class="result-val gold">1:${rr}</span></div>` : ''}
    </div>`;
};

const isSessionActive = (open, close) => {
  const now = new Date();
  const utcH = now.getUTCHours();
  if (open < close) return utcH >= open && utcH < close;
  return utcH >= open || utcH < close;
};

  const phone = document.getElementById('forgotPhone')?.value.trim();
  if (!phone) { document.getElementById('forgotMsg').innerHTML = '<div class="al al-e">Enter phone</div>'; return; }
  const admin = ADMINS.find(a => a.phone === phone);

  if (!user) { const users = await getUsers(); user = users.find(u => u.phone === phone); }
  if (!user) { document.getElementById('forgotMsg').innerHTML = '<div class="al al-e">No account found</div>'; return; }
  document.querySelector('.modal-overlay')?.remove();

const verifySecAnswer = async (username) => {
  const answer = document.getElementById('secAnswer')?.value.trim().toLowerCase();
  if (!answer) { document.getElementById('secMsg').innerHTML = '<div class="al al-e">Enter answer</div>'; return; }
  const admin = ADMINS.find(a => a.username === username);
  let user = admin;
  if (!user) { const users = await getUsers(); user = users.find(u => u.username === username); }
  if (user && user.security_answer === answer) {
    document.querySelector('.modal-overlay')?.remove();
    alert('✅ Verified!\n\nUsername: ' + user.username + '\nPassword: ' + user.password);

      <button class="nav-btn${v === 'checklist' ? ' active' : ''}" onclick="navigateTo('checklist')"><span class="nav-icon">✅</span>Checklist</button>
    </div>
  `;
  if (v === 'home') renderHome();
  if (v === 'marketplace') renderMarketplace();
  if (v === 'contacts') renderContacts();
  if (v === 'community') renderCommunity();
  if (v === 'messages') renderMessages();
  if (v === 'journal') renderJournal();
  if (v === 'risk') renderRiskCalc();
  if (v === 'pip') renderPipCalc();
  if (v === 'sessions') renderSessions();
  if (v === 'checklist') renderChecklist();
  if (v === 'analysis') renderAnalysis();
  if (v === 'learning') renderLearning();
  if (v === 'brokers') renderBrokers();
  if (v === 'settings') renderSettings();
  if (isAdmin && v === 'admin') renderAdminPanel();
  if (!_pullToRefreshInitialized) { initPullToRefresh(); _pullToRefreshInitialized = true; }
  startMessagePolling();
  requestNotificationPermission();
  getUnreadCount(currentUser.username).then(count => { lastUnreadCount = count; updateMsgBadge(count); });
};

const doLogin = async () => {
  const username = document.getElementById('loginUsername')?.value.trim();
  const password = document.getElementById('loginPassword')?.value.trim();
  const remember = document.getElementById('rememberMe')?.checked || false;
  if (!username || !password) { showMsg('Enter username and password', 'error'); return; }
  const admin = ADMINS.find(a => a.username === username && a.password === password);
  if (admin) { currentUser = { ...admin, role: 'admin' }; if (remember) localStorage.setItem('ultron_user', username); await loadAppSettings(); await loadMarketItems(); await loadJournals(username); await loadLearningFolders(); await loadLearningItems(); renderApp(); return; }
  const users = await getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (user) { currentUser = user; if (remember) localStorage.setItem('ultron_user', username); await loadAppSettings(); await loadMarketItems(); await loadJournals(username); await loadLearningFolders(); await loadLearningItems(); renderApp(); return; }
  showMsg('Invalid username or password', 'error');
};

const doSignup = async () => {
  const username = document.getElementById('signupUsername')?.value.trim();
  const phone = document.getElementById('signupPhone')?.value.trim();
  const password = document.getElementById('signupPassword')?.value.trim();
  const confirm = document.getElementById('signupConfirm')?.value.trim();
  const secQ = document.getElementById('securityQuestion')?.value;
  const secA = document.getElementById('securityAnswerInput')?.value.trim();
  if (!username || username.length < 3) { showMsg('Username min 3 chars', 'error'); return; }
  if (!phone || phone.length < 10) { showMsg('Valid phone required', 'error'); return; }
  if (password.length < 6) { showMsg('Password min 6 chars', 'error'); return; }
  if (password !== confirm) { showMsg('Passwords mismatch', 'error'); return; }
  if (!secQ || !secA) { showMsg('Security question required', 'error'); return; }
  if (ADMINS.some(a => a.username === username)) { showMsg('Username not available', 'error'); return; }
  const users = await getUsers();
  if (users.find(u => u.username === username)) { showMsg('Username taken', 'error'); return; }
  if (users.find(u => u.phone === phone)) { showMsg('Phone already registered', 'error'); return; }
  if (await addUser({ username, phone, password, role: 'user', security_question: secQ, security_answer: secA.toLowerCase() })) { showMsg('Account created! Sign in.', 'success'); showSignupBack(); }
  else showMsg('Error creating account', 'error');
};

const showLogin = () => {
  const saved = localStorage.getItem('ultron_user');
  document.getElementById('app').innerHTML = '<div class="login-container"><div class="login-header"><div class="icon">📊</div><h1>Ultron Trading</h1><p>Trading Platform</p></div><div id="loginForm"><div class="card"><div class="ctitle">Sign In</div><input type="text" id="loginUsername" placeholder="Username" value="' + esc(saved || '') + '"><div class="pw-w"><input type="password" id="loginPassword" placeholder="Password"><button class="eye-btn" onclick="togglePwField(\'loginPassword\')">👁️</button></div><div class="check-row"><input type="checkbox" id="rememberMe" ' + (saved ? 'checked' : '') + '><label>Remember me</label></div><button class="btn btn-p btn-w" onclick="doLogin()">Sign In</button><button class="btn btn-gh btn-w" style="margin-top:10px" onclick="showSignup()">Create Account</button></div></div><div id="signupForm" style="display:none"><div class="card"><div class="ctitle">Create Account</div><input type="text" id="signupUsername" placeholder="Username (min 3)"><input type="tel" id="signupPhone" placeholder="Phone"><div class="pw-w"><input type="password" id="signupPassword" placeholder="Password (min 6)"><button class="eye-btn" onclick="togglePwField(\'signupPassword\')">👁️</button></div><div class="pw-w"><input type="password" id="signupConfirm" placeholder="Confirm"><button class="eye-btn" onclick="togglePwField(\'signupConfirm\')">👁️</button></div><select id="securityQuestion">' + SECURITY_QUESTIONS.map(q => '<option>' + q + '</option>').join('') + '</select><input type="text" id="securityAnswerInput" placeholder="Your answer"><button class="btn btn-p btn-w" onclick="doSignup()">Create Account</button><button class="btn btn-gh btn-w" style="margin-top:10px" onclick="showSignupBack()">Back</button></div></div><div id="messageContainer"></div></div>';
};

window.onload = async () => {
  await loadAppSettings();
  const savedUser = localStorage.getItem('ultron_user');
  if (savedUser) {
    const admin = ADMINS.find(a => a.username === savedUser);
    if (admin) { currentUser = { ...admin, role: 'admin' }; await loadMarketItems(); await loadJournals(savedUser); await loadLearningFolders(); await loadLearningItems(); renderApp(); return; }

  showLogin();
};
