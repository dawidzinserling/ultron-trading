<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Family Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============ THEME VARIABLES ============ */
:root, [data-theme="dark"] {
  --bg:#080E18; --bg2:#0D1525; --bg3:#121C30;
  --s1:#18243A; --s2:#1E2E48; --s3:#243556;
  --bd:rgba(64,196,196,0.10); --bd2:rgba(64,196,196,0.22);
  --a1:#3DD9D9; --a2:#28BABA; --a3:#1A9B9B;
  --tx:#EDF4F7; --tx2:#7ABECE; --tx3:#3E6A7A;
  --nav-bg:#0D1525; --shadow:0 4px 20px rgba(0,0,0,0.45);
  --shadow-sm:0 1px 6px rgba(0,0,0,0.25); --btn-text:#040C14;
  --danger:#FF5F6D; --danger-bg:rgba(255,95,109,0.14);
  --success:#3DD9A0; --whatsapp:#25D366; --recipe:#FF9F5A; --location:#6EE7B7;
}
[data-theme="light"] {
  --bg:#F0F4F8; --bg2:#FFFFFF; --bg3:#E4EEF5;
  --s1:#FFFFFF; --s2:#EEF5FB; --s3:#DCF0F8;
  --bd:rgba(0,140,160,0.13); --bd2:rgba(0,140,160,0.26);
  --a1:#0088A0; --a2:#006D82; --a3:#005566;
  --tx:#0B1E2C; --tx2:#3A6070; --tx3:#80AABC;
  --nav-bg:#FFFFFF; --shadow:0 4px 20px rgba(0,100,130,0.10);
  --shadow-sm:0 1px 6px rgba(0,100,130,0.07); --btn-text:#FFFFFF;
  --danger:#D43A3A; --danger-bg:rgba(212,58,58,0.10);
  --success:#1A8060; --whatsapp:#1DA851; --recipe:#E07830; --location:#1A8060;
}
/* 🔴 Red / Black */
[data-theme="redblack"] {
  --bg:#100608; --bg2:#180A0C; --bg3:#1E0E10;
  --s1:#2A1215; --s2:#32161A; --s3:#3C1A1E;
  --bd:rgba(220,60,80,0.12); --bd2:rgba(220,60,80,0.28);
  --a1:#E8364A; --a2:#C82A3C; --a3:#A0202E;
  --tx:#FAE8EA; --tx2:#C88090; --tx3:#6A3840;
  --nav-bg:#180A0C; --shadow:0 4px 20px rgba(0,0,0,0.55);
  --shadow-sm:0 1px 6px rgba(0,0,0,0.35); --btn-text:#FFF0F2;
  --danger:#FF8A70; --danger-bg:rgba(255,138,112,0.14);
  --success:#3DD9A0; --whatsapp:#25D366; --recipe:#FF9F5A; --location:#FF8A8A;
}
/* 💙 Blue / Pink */
[data-theme="bluepink"] {
  --bg:#07091A; --bg2:#0D1030; --bg3:#10163A;
  --s1:#161D44; --s2:#1C2452; --s3:#222C5E;
  --bd:rgba(160,100,240,0.12); --bd2:rgba(160,100,240,0.28);
  --a1:#C86EF0; --a2:#A050D0; --a3:#7A36AA;
  --tx:#F2E8FA; --tx2:#B090D0; --tx3:#5A3878;
  --nav-bg:#0D1030; --shadow:0 4px 20px rgba(0,0,0,0.55);
  --shadow-sm:0 1px 6px rgba(0,0,0,0.35); --btn-text:#1A0030;
  --danger:#FF5F6D; --danger-bg:rgba(255,95,109,0.14);
  --success:#3DD9A0; --whatsapp:#25D366; --recipe:#FF85C0; --location:#85D4FF;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:14px; }
body { font-family:'Figtree',sans-serif; background:var(--bg); color:var(--tx); min-height:100vh; transition:background .3s,color .3s; }
#app { width:100%; max-width:560px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; }

/* TOP BAR */
.tbw { position:sticky; top:0; z-index:200; background:var(--bg2); border-bottom:1px solid var(--bd); height:44px; box-shadow:var(--shadow-sm); }
.tb { height:100%; display:flex; align-items:center; justify-content:space-between; padding:0 10px; }
.logo { font-size:13px; font-weight:900; color:var(--a1); display:flex; align-items:center; gap:6px; letter-spacing:-.3px; }
.logo-icon { width:24px; height:24px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:12px; }
.tb-r { display:flex; align-items:center; gap:5px; }
.av { width:26px; height:26px; border-radius:7px; background:linear-gradient(135deg,var(--a1),var(--a3)); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:11px; color:var(--btn-text); flex-shrink:0; overflow:hidden; cursor:pointer; }
.av img { width:100%; height:100%; object-fit:cover; border-radius:7px; }
.tb-name { font-size:11px; font-weight:600; max-width:65px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--tx2); }
.icon-btn { background:var(--s1); border:1px solid var(--bd); border-radius:7px; cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all .2s; color:var(--tx2); }
.icon-btn:active { transform:scale(.93); }

/* DRAWER MENU */
.menu-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:300; display:none; backdrop-filter:blur(5px); }
.menu-overlay.show { display:block; }
.menu-panel { position:fixed; top:0; right:-270px; width:270px; height:100%; background:var(--bg2); z-index:301; transition:right .3s cubic-bezier(.4,0,.2,1); box-shadow:-4px 0 28px rgba(0,0,0,.35); display:flex; flex-direction:column; border-left:1px solid var(--bd); }
.menu-panel.show { right:0; }
.menu-header { padding:12px 12px 10px; border-bottom:1px solid var(--bd); }
.menu-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.menu-title { font-weight:800; font-size:10px; color:var(--tx3); text-transform:uppercase; letter-spacing:1px; }
.menu-user { display:flex; align-items:center; gap:8px; }
.menu-av { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--a1),var(--a3)); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; color:var(--btn-text); overflow:hidden; flex-shrink:0; }
.menu-av img { width:100%; height:100%; object-fit:cover; }
.menu-username { font-weight:800; font-size:13px; }
.menu-phone { font-size:10px; color:var(--tx3); margin-top:1px; }
.close-btn { background:var(--s1); border:1px solid var(--bd); border-radius:7px; color:var(--tx2); font-size:13px; cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
.menu-items { flex:1; padding:6px; overflow-y:auto; }
.menu-item { display:flex; align-items:center; gap:8px; padding:8px 9px; border-radius:8px; cursor:pointer; color:var(--tx2); font-size:12px; font-weight:600; transition:all .18s; margin-bottom:1px; }
.menu-item:hover { background:var(--s1); color:var(--tx); }
.menu-item.active { background:var(--a1); color:var(--btn-text); }
.menu-item .mi-icon { font-size:14px; width:18px; text-align:center; }
.menu-item.danger { color:var(--danger); }
.menu-item.danger:hover { background:var(--danger-bg); }
.menu-divider { height:1px; background:var(--bd); margin:4px 0; }

/* BOTTOM NAV */
.bottom-nav { position:sticky; bottom:0; z-index:200; background:var(--nav-bg); border-top:1px solid var(--bd); display:flex; justify-content:space-around; padding:4px 2px calc(env(safe-area-inset-bottom) + 4px); box-shadow:0 -1px 10px rgba(0,0,0,.12); }
.nav-tab { display:flex; flex-direction:column; align-items:center; gap:1px; cursor:pointer; padding:3px 6px; border-radius:8px; transition:all .18s; border:none; background:none; color:var(--tx3); min-width:44px; font-family:'Figtree',sans-serif; }
.nav-tab.active { color:var(--a1); }
.nav-tab .nt-icon { font-size:18px; line-height:1; }
.nav-tab .nt-label { font-size:8px; font-weight:700; letter-spacing:.3px; }

/* SCREEN */
.scr { padding:8px 8px 12px; min-height:calc(100vh - 108px); }
.tab-pane { display:none; animation:fadeIn .18s ease; }
.tab-pane.show { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* CARDS */
.card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; padding:10px; margin-bottom:6px; box-shadow:var(--shadow-sm); }
.ctitle { font-size:8.5px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--tx3); margin-bottom:8px; }
.sh { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
.sh-t { font-size:16px; font-weight:900; color:var(--tx); letter-spacing:-.3px; }
.sh-s { font-size:10px; color:var(--tx3); margin-top:2px; font-weight:500; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:4px; padding:7px 12px; border:none; border-radius:8px; font-weight:700; font-size:11px; cursor:pointer; transition:all .18s; font-family:'Figtree',sans-serif; letter-spacing:.1px; }
.btn:active { transform:scale(.96); }
.btn-w { width:100%; }
.btn-p { background:linear-gradient(135deg,var(--a1),var(--a3)); color:var(--btn-text); }
.btn-d { background:var(--danger-bg); color:var(--danger); border:1px solid rgba(255,95,109,.2); }
.btn-gh { background:var(--s2); color:var(--tx2); border:1px solid var(--bd); }
.btn-sm { padding:4px 9px; font-size:10.5px; border-radius:7px; }
.btn-lg { padding:9px 16px; font-size:12px; }
.btn-recipe { background:linear-gradient(135deg,#FF9F5A,#E07030); color:#fff; }
.btn-location { background:linear-gradient(135deg,#6EE7B7,#1A9B6E); color:#fff; }

/* INPUTS */
input, textarea, select { width:100%; padding:7px 10px; background:var(--bg3); border:1.5px solid var(--bd); border-radius:8px; color:var(--tx); font-size:12px; font-family:'Figtree',sans-serif; margin-bottom:6px; outline:none; transition:border-color .2s,box-shadow .2s; }
input:focus, textarea:focus, select:focus { border-color:var(--a1); box-shadow:0 0 0 2px rgba(61,217,217,.1); }
input::placeholder, textarea::placeholder { color:var(--tx3); }
select option { background:var(--bg3); color:var(--tx); }
textarea { resize:vertical; min-height:60px; }

/* THEME PICKER */
.theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:6px; }
.theme-swatch { border-radius:10px; padding:8px 4px 6px; text-align:center; cursor:pointer; border:2px solid transparent; transition:all .2s; position:relative; overflow:hidden; }
.theme-swatch.active { border-color:var(--a1); }
.theme-swatch .sw-preview { width:28px; height:28px; border-radius:50%; margin:0 auto 4px; display:flex; align-items:center; justify-content:center; font-size:14px; }
.theme-swatch .sw-label { font-size:9px; font-weight:700; color:var(--tx2); }

/* ALERTS */
.al { padding:6px 10px; border-radius:7px; font-size:11px; margin-bottom:6px; font-weight:500; }
.al-s { background:rgba(61,217,160,.15); color:var(--success); }
.al-e { background:var(--danger-bg); color:var(--danger); }
.al-i { background:rgba(61,217,217,.1); color:var(--a1); }

/* MODAL */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.8); z-index:1000; display:flex; align-items:center; justify-content:center; padding:14px; animation:fadeIn .15s ease; backdrop-filter:blur(7px); }
.modal-content { background:var(--s1); border:1px solid var(--bd2); border-radius:14px; padding:14px 12px 12px; width:100%; max-width:340px; box-shadow:0 20px 50px rgba(0,0,0,.55); max-height:90vh; overflow-y:auto; }
.modal-title { font-size:14px; font-weight:900; color:var(--tx); margin-bottom:3px; letter-spacing:-.2px; }
.modal-sub { font-size:10px; color:var(--tx2); margin-bottom:10px; line-height:1.5; }
.modal-buttons { display:flex; gap:6px; margin-top:10px; }
.modal-buttons button { flex:1; }

/* FOLDER GRID */
.folder-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
.folder-card { background:var(--s1); border:1.5px solid var(--bd); border-radius:12px; padding:10px 8px; cursor:pointer; transition:all .2s; text-align:center; position:relative; box-shadow:var(--shadow-sm); }
.folder-card:active { transform:scale(.97); }
.folder-card .folder-icon { font-size:26px; margin-bottom:4px; }
.folder-card .folder-name { font-weight:800; font-size:11px; margin-bottom:2px; word-break:break-word; }
.folder-actions { display:flex; gap:4px; margin-top:6px; justify-content:center; }

/* CONTACTS */
.ccard { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 10px; margin-bottom:6px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-sm); }
.c-av { width:34px; height:34px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:var(--btn-text); flex-shrink:0; overflow:hidden; }
.c-av img { width:100%; height:100%; object-fit:cover; }

/* LOGIN */
.login-container { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:16px 14px; background:var(--bg); }
.login-header { text-align:center; margin-bottom:20px; }
.login-logo { width:54px; height:54px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px; margin:0 auto 10px; box-shadow:0 6px 24px rgba(61,217,217,.3); }
.login-header h1 { font-size:20px; font-weight:900; color:var(--tx); margin-bottom:3px; letter-spacing:-.5px; }
.login-header p { font-size:11px; color:var(--tx3); font-weight:500; }
.pw-w { position:relative; margin-bottom:6px; }
.pw-w input { margin-bottom:0; padding-right:36px; }
.eye-btn { position:absolute; right:0; top:0; bottom:0; width:36px; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; font-size:14px; color:var(--tx3); }
.check-row { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
.check-row label { font-size:11px; color:var(--tx2); font-weight:500; cursor:pointer; }
.lnk { color:var(--a1); cursor:pointer; font-size:11px; font-weight:600; }

/* CALENDAR */
.cal-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--s1); border-radius:10px; margin-bottom:6px; border:1px solid var(--bd); }
.cal-nav-btn { background:var(--bg3); border:none; border-radius:7px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--tx2); transition:all .18s; font-family:'Figtree',sans-serif; }
.cal-nav-btn:active { transform:scale(.93); }
.cal-month-label { font-size:13px; font-weight:900; color:var(--tx); letter-spacing:-.2px; }
.cal-grid { background:var(--s1); border-radius:12px; padding:8px 6px; border:1px solid var(--bd); margin-bottom:8px; box-shadow:var(--shadow-sm); }
.cal-day-headers { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:3px; }
.cal-day-hdr { text-align:center; font-size:8px; font-weight:800; color:var(--tx3); text-transform:uppercase; letter-spacing:.5px; padding:2px 0; }
.cal-days { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
.cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:7px; cursor:pointer; transition:all .14s; position:relative; padding:1px; min-width:0; }
.cal-day:hover { background:var(--s2); }
.cal-day.today { background:rgba(61,217,217,.18); }
.cal-day.today .cal-day-num { color:var(--a1); font-weight:900; }
.cal-day.selected { background:var(--a1); }
.cal-day.selected .cal-day-num { color:var(--btn-text); font-weight:900; }
.cal-day.selected .cal-dot-row .cal-dot { background:var(--btn-text) !important; opacity:.7; }
.cal-day.other-month .cal-day-num { color:var(--tx3); opacity:.5; }
.cal-day-num { font-size:11px; font-weight:600; color:var(--tx); line-height:1; }
.cal-dot-row { display:flex; gap:2px; margin-top:2px; height:3px; align-items:center; justify-content:center; }
.cal-dot { width:3px; height:3px; border-radius:50%; flex-shrink:0; }
.dot-birthday { background:#FF6B9D; } .dot-anniversary { background:#FFB347; }
.dot-event { background:var(--a1); } .dot-holiday { background:#A78BFA; } .dot-reminder { background:#6EE7B7; }
.event-badge { display:inline-flex; align-items:center; gap:2px; padding:2px 6px; border-radius:20px; font-size:8.5px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }
.badge-birthday { background:rgba(255,107,157,.15); color:#FF6B9D; }
.badge-anniversary { background:rgba(255,179,71,.15); color:#D4943A; }
.badge-event { background:rgba(61,217,217,.13); color:var(--a1); }
.badge-holiday { background:rgba(167,139,250,.15); color:#A78BFA; }
.badge-reminder { background:rgba(110,231,183,.15); color:#3ABB8A; }
.event-card { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 10px; margin-bottom:6px; display:flex; align-items:flex-start; gap:8px; box-shadow:var(--shadow-sm); }
.event-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.ei-birthday { background:rgba(255,107,157,.15); } .ei-anniversary { background:rgba(255,179,71,.12); }
.ei-event { background:rgba(61,217,217,.10); } .ei-holiday { background:rgba(167,139,250,.14); } .ei-reminder { background:rgba(110,231,183,.14); }
.event-title { font-size:12px; font-weight:800; margin-bottom:2px; letter-spacing:-.1px; }
.event-date-label { font-size:9.5px; color:var(--tx3); font-weight:600; }
.event-desc { font-size:10.5px; color:var(--tx2); margin-top:3px; line-height:1.4; }
.event-actions { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
.empty-state { text-align:center; padding:22px 14px; color:var(--tx3); }
.empty-icon { font-size:36px; margin-bottom:8px; opacity:.6; }
.empty-text { font-size:12px; font-weight:600; margin-bottom:3px; color:var(--tx2); }
.empty-sub { font-size:10px; }
.pill-tabs { display:flex; gap:4px; margin-bottom:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
.pill-tabs::-webkit-scrollbar { display:none; }
.pill-tab { flex-shrink:0; padding:4px 10px; border-radius:20px; border:1.5px solid var(--bd); background:none; color:var(--tx2); font-size:10px; font-weight:700; cursor:pointer; transition:all .18s; font-family:'Figtree',sans-serif; }
.pill-tab.active { background:var(--a1); color:var(--btn-text); border-color:transparent; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
.stat-card { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 4px; text-align:center; box-shadow:var(--shadow-sm); }
.stat-num { font-size:20px; font-weight:900; color:var(--a1); letter-spacing:-1px; }
.stat-label { font-size:8.5px; color:var(--tx3); font-weight:700; margin-top:1px; text-transform:uppercase; letter-spacing:.5px; }

/* UPCOMING */
.upcoming-strip { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 10px; margin-bottom:6px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-sm); }
.udb { background:var(--a1); color:var(--btn-text); border-radius:7px; padding:4px 7px; text-align:center; min-width:38px; flex-shrink:0; }
.udb-day { font-size:14px; font-weight:900; line-height:1; }
.udb-mon { font-size:7px; font-weight:900; text-transform:uppercase; letter-spacing:.5px; }

/* RECIPE CARDS */
.recipe-card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; overflow:hidden; margin-bottom:8px; box-shadow:var(--shadow-sm); transition:all .2s; }
.recipe-card:active { transform:scale(.98); }
.recipe-img { width:100%; height:110px; object-fit:cover; display:block; }
.recipe-img-placeholder { width:100%; height:110px; background:linear-gradient(135deg,rgba(255,159,90,.15),rgba(255,159,90,.05)); display:flex; align-items:center; justify-content:center; font-size:36px; }
.recipe-body { padding:8px 10px; }
.recipe-title { font-size:13px; font-weight:900; margin-bottom:4px; letter-spacing:-.2px; }
.recipe-meta { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:5px; }
.recipe-badge { display:inline-flex; align-items:center; gap:2px; padding:2px 6px; border-radius:6px; font-size:8.5px; font-weight:700; background:rgba(255,159,90,.12); color:var(--recipe); }
.recipe-desc { font-size:10.5px; color:var(--tx2); line-height:1.4; }

/* PROFILE PIC */
.profile-pic-wrap { position:relative; width:64px; height:64px; margin:0 auto 10px; cursor:pointer; }

  if (!text) return '';

};

  const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  return `${days[dt.getDay()]}, ${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
};

const timeAgoStr = (isoStr) => {
  if (!isoStr) return 'Never';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
};

      location_lng: prof.location_lng || null,
      location_updated: prof.location_updated || null,

// ============ IMAGE COMPRESSION ============
// Compresses any image to JPEG at a target max dimension and quality.
// Returns a base64 data URL. maxPx = longest edge in pixels, quality 0-1.
const compressImage = (file, maxPx = 1200, quality = 0.78) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onerror = () => reject(new Error('Read failed'));
  reader.onload = (e) => {
    const img = new Image();
    img.onerror = () => reject(new Error('Image load failed'));
    img.onload = () => {
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

const findFamilyMember = async (username) => {
  showMessage(`Getting ${username}'s location…`, 'info');
  // Pull the freshest data directly from Supabase
  try {
    const r = await sbFetch(`user_profiles?username=eq.${encodeURIComponent(username)}&select=*`, 'GET');
    if (r.ok) {
      const data = await r.json();
      if (data.length > 0) {
        const prof = data[0];
        if (!userProfiles[username]) userProfiles[username] = {};
        userProfiles[username].location_lat = prof.location_lat;
        userProfiles[username].location_lng = prof.location_lng;
        userProfiles[username].location_updated = prof.location_updated;
        userProfiles[username].sharing_with = prof.sharing_with ? JSON.parse(prof.sharing_with) : [];
      }
    }
  } catch(e) { console.error(e); }

  const prof = userProfiles[username];
  if (!prof?.location_lat || !prof?.location_lng) {
    showMessage(`${username}'s location is not available. They may need to open the app.`, 'error');
    return;
  }
  const updated = prof.location_updated ? timeAgoStr(prof.location_updated) : 'Unknown';
  const url = `https://www.google.com/maps/search/?api=1&query=${prof.location_lat},${prof.location_lng}`;
  if (window.confirm(`📍 Open ${username}'s location in Google Maps?\n\nLast updated: ${updated}`)) {
    window.open(url, '_blank');
  }
};

// ============ RENDER: CALENDAR ============
const renderCalendar = () => {
  const container = document.getElementById('calendarContainer'); if (!container) return;
  const year = calendarDate.getFullYear(), month = calendarDate.getMonth();
  const today = toDateStr(new Date());
  let startDow = new Date(year, month, 1).getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  const lastDate = new Date(year, month + 1, 0).getDate();
  const days = [];
  for (let i = 0; i < startDow; i++) { const d = new Date(year, month, 1 - startDow + i); days.push({ dateStr: toDateStr(d), num: d.getDate(), other: true }); }
  for (let d = 1; d <= lastDate; d++) days.push({ dateStr: `${year}-${pad2(month+1)}-${pad2(d)}`, num: d, other: false });
  while (days.length < 42) { const d = new Date(year, month + 1, days.length - startDow - lastDate + 1); days.push({ dateStr: toDateStr(d), num: d.getDate(), other: true }); }
  const evByDate = {};
  calendarEvents.forEach(ev => { if (!evByDate[ev.eventDate]) evByDate[ev.eventDate] = []; evByDate[ev.eventDate].push(ev); });
  let listEvents = calendarEvents.filter(ev => { const [y,m] = ev.eventDate.split('-'); return parseInt(y)===year && parseInt(m)===(month+1); });
  if (calendarSelectedDay) listEvents = listEvents.filter(ev => ev.eventDate === calendarSelectedDay);
  if (calendarFilter !== 'all') listEvents = listEvents.filter(ev => ev.eventType === calendarFilter);
  const dayHeaders = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  container.innerHTML = `
    <div class="sh"><div><div class="sh-t">📅 Calendar</div><div class="sh-s">Family events &amp; birthdays</div></div><button class="btn btn-p btn-sm" onclick="openAddEventModal('${today}')">+ Add</button></div>
    <div class="cal-header"><button class="cal-nav-btn" onclick="calPrevMonth()">‹</button><div class="cal-month-label">${monthName(month)} ${year}</div><button class="cal-nav-btn" onclick="calNextMonth()">›</button></div>
    <div class="cal-grid">
      <div class="cal-day-headers">${dayHeaders.map(d => `<div class="cal-day-hdr">${d}</div>`).join('')}</div>
      <div class="cal-days">
        ${days.map(day => {
          const dayEvs = evByDate[day.dateStr] || [];
          const isToday = day.dateStr === today, isSelected = day.dateStr === calendarSelectedDay;
          let cls = 'cal-day'; if (day.other) cls += ' other-month'; if (isToday && !isSelected) cls += ' today'; if (isSelected) cls += ' selected';
          const dots = dayEvs.slice(0,3).map(e => `<span class="cal-dot ${(EVENT_TYPES[e.eventType]||EVENT_TYPES.event).dotClass}"></span>`).join('');
          return `<div class="${cls}" onclick="calSelectDay('${day.dateStr}')"><span class="cal-day-num">${day.num}</span><div class="cal-dot-row">${dots}</div></div>`;
        }).join('')}
      </div>
    </div>
    <div class="pill-tabs">
      <button class="pill-tab ${calendarFilter==='all'?'active':''}" onclick="calSetFilter('all')">All</button>
      ${Object.entries(EVENT_TYPES).map(([k,v]) => `<button class="pill-tab ${calendarFilter===k?'active':''}" onclick="calSetFilter('${k}')">${v.icon} ${v.label}</button>`).join('')}
    </div>
    ${calendarSelectedDay ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px"><div style="font-size:12px;font-weight:700;color:var(--a1)">📍 ${formatDate(calendarSelectedDay)}</div><div style="display:flex;gap:5px"><button class="btn btn-sm btn-p" onclick="openAddEventModal('${calendarSelectedDay}')">+ Add</button><button class="btn btn-sm btn-gh" onclick="calSelectDay('${calendarSelectedDay}')">Show All</button></div></div>` : `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--tx3)">${monthName(month)} · ${listEvents.length} event${listEvents.length!==1?'s':''}</div></div>`}
    ${listEvents.length === 0 ? `<div class="empty-state"><div class="empty-icon">🗓️</div><div class="empty-text">${calendarSelectedDay ? 'No events on this day' : 'No events this month'}</div><div class="empty-sub">Tap a day or use "+ Add"</div></div>` : listEvents.map(ev => {
      const et = EVENT_TYPES[ev.eventType] || EVENT_TYPES.event, canEdit = canEditEvent(ev);
      return `<div class="event-card"><div class="event-icon ${et.iconClass}">${et.icon}</div><div style="flex:1;min-width:0"><div class="event-title">${escapeHtml(ev.title)}</div><div style="margin-top:2px"><span class="event-badge ${et.badgeClass}">${et.label}</span></div><div class="event-date-label" style="margin-top:4px">📅 ${formatDateFull(ev.eventDate)}</div>${ev.description ? `<div class="event-desc">${escapeHtml(ev.description)}</div>` : ''}<div class="event-date-label" style="margin-top:4px">👤 ${escapeHtml(ev.createdBy)}</div>${canEdit ? `<div class="event-actions"><button class="btn btn-sm btn-gh" onclick="openEditEventModal(${ev.id})">✏️ Edit</button><button class="btn btn-sm btn-d" onclick="confirmDeleteEvent(${ev.id})">🗑️ Delete</button></div>` : ''}</div></div>`;
    }).join('')}`;
};

        💡 Your location updates automatically while you use the app. Family members you allow can tap <strong>Find</strong> to see your latest position.
      </div>
    </div>

    <!-- WHO CAN SEE MY LOCATION -->
    ${others.length > 0 ? `
    <div class="card">
      <div class="ctitle">👁️ Who Can See My Location</div>
      ${others.map(u => `
        <div class="permission-user">
          <div style="width:32px;height:32px;flex-shrink:0">${avatarHtml(u.username, 32, 9)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:12px">${escapeHtml(u.username)}</div>
            <div style="font-size:10px;color:var(--tx3)">${sharingWith.includes(u.username) ? '✅ Can see your location' : '🔒 Cannot see'}</div>
          </div>
          <label class="toggle-pill">
            <input type="checkbox" ${sharingWith.includes(u.username) ? 'checked' : ''} onchange="toggleLocationPermission('${escapeHtml(u.username)}')">
            <span class="toggle-slider"></span>
          </label>
        </div>`).join('')}
    </div>` : ''}

    <!-- FAMILY MEMBERS -->
    <div style="font-size:13px;font-weight:800;color:var(--tx);margin:8px 0 8px">👥 Members</div>
    ${others.length === 0 ? `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">No other members yet</div></div>` : others.map(u => {
      const uprof = userProfiles[u.username];
      const canFind = uprof?.sharing_with?.includes(currentUser.username) && uprof?.location_lat;
      const isSharing = uprof?.sharing_with?.includes(currentUser.username);
      const lastSeen = uprof?.location_updated ? timeAgoStr(uprof.location_updated) : null;
      return `
        <div class="ccard">
          <div class="c-av">${avatarHtml(u.username, 40, 12)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:13px">${escapeHtml(u.username)}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:1px">📞 ${escapeHtml(u.phone)}</div>
            <div style="margin-top:3px;display:flex;align-items:center;gap:4px">
              ${isSharing ? `<span class="location-status ls-sharing">📍 Sharing</span>` : `<span class="location-status ls-private">🔒 Private</span>`}
              ${isSharing && lastSeen ? `<span style="font-size:9px;color:var(--tx3)">${lastSeen}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
            <div style="display:flex;gap:5px">
              <button class="btn btn-sm btn-gh" onclick="window.location.href='tel:${escapeHtml(u.phone)}'" style="padding:0;width:30px;height:30px;border-radius:8px;font-size:15px">📞</button>
              <button class="btn btn-sm" onclick="openWhatsApp('${escapeHtml(u.phone)}')" style="padding:0;width:30px;height:30px;border-radius:8px;background:var(--whatsapp);color:white;border:none;font-size:15px">💬</button>
            </div>
            <button class="find-btn" onclick="findFamilyMember('${escapeHtml(u.username)}')" ${!canFind ? 'disabled title="Location not shared"' : ''}>
              📍 Find${!canFind ? ' 🔒' : ''}
            </button>
          </div>
        </div>`;
    }).join('')}`;
};

// ============ RENDER: SETTINGS ============

  const myAvatarUrl = myProfile?.avatar_url;
  const notificationsEnabled = false; // notifications removed

    <div class="sh"><div class="sh-t">⚙️ Settings</div></div>

      <div class="profile-pic-wrap" onclick="openProfilePicModal()">
        <div class="pav">${myAvatarUrl ? `<img src="${myAvatarUrl}" onerror="this.parentElement.innerHTML='${getInitial(currentUser.username)}'" />` : getInitial(currentUser.username)}</div>
        <div class="profile-pic-badge">📷</div>
      </div>
      <div style="font-weight:800;font-size:14px;margin-bottom:2px">${escapeHtml(currentUser.username)}</div>

      <div class="pw-w"><input type="password" id="newPassword" placeholder="New password (min 6 chars)"><button class="eye-btn" onclick="togglePassword('newPassword')">👁️</button></div>
      <div class="pw-w"><input type="password" id="confirmPassword" placeholder="Confirm new password"><button class="eye-btn" onclick="togglePassword('confirmPassword')">👁️</button></div>

};

// ============ RENDER: ADMIN ============
const renderAdminPanel = async () => {
  const container = document.getElementById('adminContainer'); if (!container) return;
  container.innerHTML = `<div style="text-align:center;padding:16px;color:var(--tx3);font-size:12px">Loading...</div>`;
  const users = await getUsers();
  const regularUsers = users.filter(u => u.role !== 'admin');
  container.innerHTML = `
    <div class="sh"><div><div class="sh-t">👑 Admin Panel</div><div class="sh-s">${regularUsers.length} user${regularUsers.length!==1?'s':''}</div></div></div>
    <div class="card">
      <div class="ctitle">👥 User Management</div>
      ${regularUsers.length === 0 ? `<div class="empty-state" style="padding:16px"><div class="empty-icon">👤</div><div class="empty-text">No users yet</div></div>` : regularUsers.map(user => `
        <div style="background:var(--s2);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;flex-shrink:0">${avatarHtml(user.username, 36, 10)}</div>
          <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:13px">${escapeHtml(user.username)}</div><div style="font-size:10px;color:var(--tx3)">📞 ${escapeHtml(user.phone)}</div></div>
          <button class="btn btn-sm btn-d" onclick="deleteUserAccount('${escapeHtml(user.username)}')">Delete</button>
        </div>`).join('')}
    </div>`;
};

// ============ SETTINGS LOGIC ============
const updateProfile = async () => {
  const newUsername = document.getElementById('editUsername')?.value.trim();
  const newPhone = document.getElementById('editPhone')?.value.trim();
  if (!newUsername || newUsername.length < 3) { showMessage('Username: min 3 characters', 'error'); return; }
  if (!newPhone || newPhone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if (newUsername !== currentUser.username) { const users = await getUsers(); if (users.find(u => u.username === newUsername)) { showMessage('Username already taken', 'error'); return; } }
  const success = await updateUser(currentUser.username, { username: newUsername, phone: newPhone });
  if (success) { currentUser.username = newUsername; currentUser.phone = newPhone; localStorage.setItem('family_vault_user', newUsername); showMessage('Profile updated!', 'success'); renderApp(); }
  else showMessage('Error updating profile', 'error');
};
const changePassword = async () => {
  const currentPw = document.getElementById('currentPassword')?.value.trim();
  const newPw = document.getElementById('newPassword')?.value.trim();
  const confirmPw = document.getElementById('confirmPassword')?.value.trim();
  if (!currentPw || !newPw) { showMessage('Please fill all fields', 'error'); return; }
  if (newPw.length < 6) { showMessage('New password: min 6 characters', 'error'); return; }
  if (newPw !== confirmPw) { showMessage('New passwords do not match', 'error'); return; }
  const users = await getUsers();
  const user = users.find(u => u.username === currentUser.username);
  if (!user || user.password !== currentPw) { showMessage('Current password is incorrect', 'error'); return; }
  const success = await updateUser(currentUser.username, { password: newPw });
  if (success) { showMessage('Password updated!', 'success'); document.getElementById('currentPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; }
  else showMessage('Error updating password', 'error');
};
const togglePassword = (inputId) => { const input = document.getElementById(inputId); if (input) input.type = input.type === 'password' ? 'text' : 'password'; };
const deleteUserAccount = async (username) => {
  if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
  const success = await deleteUser(username);
  if (success) { showMessage(`User "${username}" deleted!`, 'success'); renderAdminPanel(); }
  else showMessage('Error deleting user', 'error');
};

// ============ FOLDER MODALS ============
const showEditLinkModal = (folderId, folderName) => {
  closeModal();
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="editLinkModal" onclick="closeModal()">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title">🔗 Edit Drive Link</div>
        <div class="modal-sub">Folder: <strong>${escapeHtml(folderName)}</strong></div>
        <input type="text" id="driveLinkUrl" placeholder="Paste Google Drive folder link" autocomplete="off">
        <div class="modal-buttons"><button class="btn btn-p" onclick="saveDriveLink(${folderId})">Save Link</button><button class="btn btn-gh" onclick="closeModal()">Cancel</button></div>
      </div>
    </div>`);
};
const saveDriveLink = async (folderId) => { const link = document.getElementById('driveLinkUrl')?.value.trim(); if (!link) { showMessage('Please enter a valid link', 'error'); return; } await updateFolderLink(folderId, link); closeModal(); renderApp(); };
const closeModal = () => { document.getElementById('editLinkModal')?.remove(); };
const openWhatsApp = (phone) => { let clean = phone.replace(/\D/g, ''); if (clean.startsWith('0')) clean = '27' + clean.substring(1); if (!clean.startsWith('27')) clean = '27' + clean; window.open(`https://wa.me/${clean}`, '_blank'); };

// ============ FORGOT PASSWORD ============
const openForgotModal = () => {
  document.getElementById('forgotModalOverlay')?.remove();
  const overlay = document.createElement('div'); overlay.id = 'forgotModalOverlay'; overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-content"><div class="modal-title">🔐 Forgot Password</div><div class="modal-sub">Enter your registered phone number.</div><input type="tel" id="forgotPhone" placeholder="e.g. 0821234567" autocomplete="off"><div id="forgotInlineMsg"></div><div class="modal-buttons"><button class="btn btn-p" onclick="checkUserForRecovery()">Next ›</button><button class="btn btn-gh" onclick="closeForgotModal()">Cancel</button></div></div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeForgotModal(); });
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('forgotPhone')?.focus(), 100);
};
const closeForgotModal = () => { document.getElementById('forgotModalOverlay')?.remove(); forgotPhoneNumber = null; };
const checkUserForRecovery = async () => {
  const phone = document.getElementById('forgotPhone')?.value.trim(); const msgEl = document.getElementById('forgotInlineMsg');
  if (!phone) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Please enter your phone number.</div>`; return; }
  if (msgEl) msgEl.innerHTML = `<div class="al al-i">Checking...</div>`;
  const users = await getUsers(); const user = users.find(u => u.phone === phone);
  if (!user) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">No account found with this number.</div>`; return; }
  forgotPhoneNumber = phone; closeForgotModal(); openSecurityModal(user.security_question);
};
const openSecurityModal = (question) => {
  document.getElementById('securityModalOverlay')?.remove();
  const overlay = document.createElement('div'); overlay.id = 'securityModalOverlay'; overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-content"><div class="modal-title">🛡️ Security Question</div><div class="modal-sub">Answer to recover your account.</div><div style="background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--a1);font-weight:700;margin-bottom:12px;line-height:1.5">${escapeHtml(question || 'Security question not set.')}</div><input type="text" id="securityAnswer" placeholder="Your answer" autocomplete="off"><div id="securityInlineMsg"></div><div class="modal-buttons"><button class="btn btn-p" onclick="verifySecurityAnswer()">Verify ›</button><button class="btn btn-gh" onclick="closeSecurityModal()">Cancel</button></div></div>`;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSecurityModal(); });
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('securityAnswer')?.focus(), 100);
};
const closeSecurityModal = () => { document.getElementById('securityModalOverlay')?.remove(); forgotPhoneNumber = null; };
const verifySecurityAnswer = async () => {
  const answer = document.getElementById('securityAnswer')?.value.trim().toLowerCase(); const msgEl = document.getElementById('securityInlineMsg');
  if (!answer) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Please enter your answer.</div>`; return; }
  if (msgEl) msgEl.innerHTML = `<div class="al al-i">Verifying...</div>`;
  const users = await getUsers(); const user = users.find(u => u.phone === forgotPhoneNumber);
  if (!user) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Something went wrong.</div>`; return; }
  if (user.security_answer === answer) { closeSecurityModal(); setTimeout(() => { alert(`✅ Identity Verified!\n\nUsername: ${user.username}\nPassword: ${user.password}\n\nPlease save this securely.`); }, 200); }
  else { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Incorrect answer. Please try again.</div>`; const a = document.getElementById('securityAnswer'); if (a) { a.value = ''; a.focus(); } }
};

// ============ AUTH ============
const doLogin = async () => {
  const username = document.getElementById('loginUsername')?.value.trim();
  const password = document.getElementById('loginPassword')?.value.trim();
  const remember = document.getElementById('rememberMe')?.checked || false;
  if (!username || !password) { showMessage('Enter username and password', 'error'); return; }
  const admin = ADMINS.find(a => a.username === username && a.password === password);
  if (admin) {
    currentUser = { ...admin, role: 'admin' };
    if (remember) localStorage.setItem('family_vault_user', username);
    await Promise.all([loadFoldersFromCloud(), loadCalendarEvents(), loadRecipes(), loadUserProfiles()]);
    startAutoLocationTracking(); // ← start auto-tracking after login
    renderApp(); return;
  }
  const users = await getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (user) {
    currentUser = user;
    if (remember) localStorage.setItem('family_vault_user', username);
    await Promise.all([loadFoldersFromCloud(), loadCalendarEvents(), loadRecipes(), loadUserProfiles()]);
    startAutoLocationTracking(); // ← start auto-tracking after login
    renderApp(); return;
  }
  showMessage('Invalid username or password', 'error');
};
const doSignup = async () => {
  const username = document.getElementById('signupUsername')?.value.trim();
  const phone = document.getElementById('signupPhone')?.value.trim();
  const password = document.getElementById('signupPassword')?.value.trim();
  const confirm = document.getElementById('signupConfirm')?.value.trim();
  const securityQuestion = document.getElementById('securityQuestion')?.value;
  const securityAnswer = document.getElementById('securityAnswerInput')?.value.trim();
  if (!username || username.length < 3) { showMessage('Username: min 3 characters', 'error'); return; }
  if (!phone || phone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if (password.length < 6) { showMessage('Password: min 6 characters', 'error'); return; }
  if (password !== confirm) { showMessage('Passwords do not match', 'error'); return; }
  if (!securityQuestion) { showMessage('Please select a security question', 'error'); return; }
  if (!securityAnswer) { showMessage('Please enter a security answer', 'error'); return; }
  if (ADMINS.some(a => a.username === username)) { showMessage('Username not available', 'error'); return; }
  const users = await getUsers();
  if (users.find(u => u.username === username)) { showMessage('Username taken', 'error'); return; }
  if (users.find(u => u.phone === phone)) { showMessage('Phone already registered', 'error'); return; }
  const success = await addUser(username, phone, password, securityQuestion, securityAnswer);
  if (success) { showMessage('Account created! Please sign in.', 'success'); showSignupBack(); }
  else showMessage('Error creating account', 'error');
};

const showLogin = () => {
  stopAutoLocationTracking();
  const savedUser = localStorage.getItem('family_vault_user');
  const theme = getTheme();
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('app').innerHTML = `
    <div class="login-container">
      <div style="position:absolute;top:12px;right:12px"><button class="icon-btn" onclick="toggleTheme();showLogin()" title="Toggle theme">${(THEMES.find(x=>x.id===theme)||THEMES[0]).icon}</button></div>
      <div class="login-header"><div class="login-logo">☁️</div><h1>Family Vault</h1><p>Your family's private corner of the cloud</p></div>
      <div id="loginForm">
        <div class="card">
          <div class="ctitle">Sign In</div>
          <input type="text" id="loginUsername" placeholder="Username" value="${escapeHtml(savedUser || '')}">
          <div class="pw-w"><input type="password" id="loginPassword" placeholder="Password"><button class="eye-btn" onclick="togglePassword('loginPassword')">👁️</button></div>
          <div class="check-row"><input type="checkbox" id="rememberMe" ${savedUser ? 'checked' : ''} style="width:auto;margin:0"><label for="rememberMe">Remember me</label></div>
          <div style="text-align:right;margin-bottom:12px"><span class="lnk" onclick="openForgotModal()">Forgot password?</span></div>
          <button class="btn btn-p btn-w btn-lg" onclick="doLogin()">Sign In</button>
          <button class="btn btn-gh btn-w" style="margin-top:8px" onclick="showSignup()">Create Account</button>
        </div>
      </div>
      <div id="signupForm" style="display:none">
        <div class="card">
          <div class="ctitle">Create Account</div>
          <input type="text" id="signupUsername" placeholder="Username (min 3 chars)">
          <input type="tel" id="signupPhone" placeholder="Phone number">
          <div class="pw-w"><input type="password" id="signupPassword" placeholder="Password (min 6 chars)"><button class="eye-btn" onclick="togglePassword('signupPassword')">👁️</button></div>
          <div class="pw-w"><input type="password" id="signupConfirm" placeholder="Confirm password"><button class="eye-btn" onclick="togglePassword('signupConfirm')">👁️</button></div>
          <div class="ctitle" style="margin-top:12px">🔐 Security Question</div>
          <select id="securityQuestion"><option value="">Select a security question...</option>${SECURITY_QUESTIONS.map(q => `<option value="${escapeHtml(q)}">${escapeHtml(q)}</option>`).join('')}</select>
          <input type="text" id="securityAnswerInput" placeholder="Your answer">
          <button class="btn btn-p btn-w btn-lg" onclick="doSignup()">Create Account</button>
          <button class="btn btn-gh btn-w" style="margin-top:8px" onclick="showSignupBack()">← Back to Sign In</button>
        </div>
      </div>
      <div id="messageContainer" style="margin-top:8px"></div>
    </div>`;
};
const showSignup = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('signupForm').style.display = 'block'; };
const showSignupBack = () => { document.getElementById('signupForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; };

// ============ INIT ============
window.onload = async () => {
  setTheme(getTheme());
  const fns = {
    doLogin, doSignup, showLogin, showSignup, showSignupBack, toggleMenu, navigateTo, signOut,
    openForgotModal, closeForgotModal, checkUserForRecovery, openSecurityModal, closeSecurityModal, verifySecurityAnswer,
    createFolderInDrive, showEditLinkModal, saveDriveLink, deleteFolder, closeModal, openCloudFolder, openFolderActions, goBackToFolders,
    changePassword, togglePassword, deleteUserAccount, openWhatsApp, updateProfile, toggleTheme, setTheme, renderSettings,
    openAddEventModal, openEditEventModal, doAddEvent, doEditEvent, confirmDeleteEvent, closeCalModal, calPrevMonth, calNextMonth, calSelectDay, calSetFilter,
    openAddRecipeModal, openEditRecipeModal, closeRecipeModal, doSaveRecipe, confirmDeleteRecipe, viewRecipeDetail, backToRecipeList, setRecipeFilter,
    triggerRecipeImageUpload, triggerRecipeCameraCapture, handleRecipeImageSelect, clearRecipeImage,
    openProfilePicModal, closeAvatarModal, triggerAvatarUpload, triggerAvatarCamera, handleAvatarSelect, clearAvatarPreview, doSaveAvatar,
    updateMyLocation, findFamilyMember, toggleLocationPermission, toggleFolderView
  };
  Object.assign(window, fns);

  const savedUser = localStorage.getItem('family_vault_user');
  if (savedUser) {
    const admin = ADMINS.find(a => a.username === savedUser);
    if (admin) {
      currentUser = { ...admin, role: 'admin' };
      await Promise.all([loadFoldersFromCloud(), loadCalendarEvents(), loadRecipes(), loadUserProfiles()]);
      await checkSupabaseTables();
      startAutoLocationTracking(); // ← auto-start on remembered login
      renderApp();
      return;
    }
    const users = await getUsers();
    const user = users.find(u => u.username === savedUser);
    if (user) {
      currentUser = user;
      await Promise.all([loadFoldersFromCloud(), loadCalendarEvents(), loadRecipes(), loadUserProfiles()]);
      await checkSupabaseTables();
      startAutoLocationTracking(); // ← auto-start on remembered login
      renderApp();
      return;
    }
  }
  showLogin();
};
</script>
